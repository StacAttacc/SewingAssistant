services:
  app:
    build:
      context: .
      args:
        VITE_API_URL: ""
    ports:
      - "8000:8000"
    env_file: backend/.env
    environment:
      DATABASE_URL: sqlite:////data/sewing_assistant.db
      UPLOADS_DIR: /data/uploads
    volumes:
      - app_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  app_data:
